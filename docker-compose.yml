services:
  ollama:
    image: ollama/ollama:latest
    container_name: hackathon-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
      - ./models:/models:ro
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3.5}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve > /tmp/ollama.log 2>&1 &
        for i in $(seq 1 60); do
          if ollama list >/dev/null 2>&1; then
            break
          fi
          sleep 2
        done
        ollama pull "${OLLAMA_MODEL:-phi3.5}" || true
        tail -f /tmp/ollama.log
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: hackathon-backend
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3.5}
      CORS_ORIGINS: http://localhost:${FRONTEND_PORT:-5173},http://127.0.0.1:${FRONTEND_PORT:-5173}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}
    container_name: hackathon-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama-data:
